# .github/workflows/ci.yml

name: CI pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    Check:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v4
            - name: Lint + Tests
              run: |
                pip install flake8
                flake8 .

    Security:
      needs: Check
      name: gitleaks
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - uses: gitleaks/gitleaks-action@v2
          env:
             GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    Build:
        needs: Security
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v4
            - name: Build image from Dockerfile
              run: docker build -t mon-app ./publisher

            - name: Trivy for vulnerabilities scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: 'mon-app:latest'
                format: 'table'
                exit-code: '1'
                severity: 'CRITICAL,HIGH'

